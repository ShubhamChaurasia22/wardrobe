<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      // Monkeypatch React DevTools to avoid semver crashes with react-three-fiber under React 19
      (function() {
        function patchHook(hook) {
          if (hook && typeof hook.registerRenderer === 'function') {
            const originalRegister = hook.registerRenderer;
            hook.registerRenderer = function(renderer) {
              if (renderer && (!renderer.version || typeof renderer.version !== 'string' || renderer.version.trim() === '')) {
                renderer.version = '19.0.0';
              }
              return originalRegister.apply(this, arguments);
            };
          }
        }
        const hook = window.__REACT_DEVTOOLS_GLOBAL_HOOK__;
        if (hook) {
          patchHook(hook);
        } else {
          let registerVal = undefined;
          Object.defineProperty(window, '__REACT_DEVTOOLS_GLOBAL_HOOK__', {
            configurable: true,
            enumerable: true,
            get() {
              return registerVal;
            },
            set(val) {
              registerVal = val;
              patchHook(registerVal);
            }
          });
        }
      })();
    </script>
    <link rel="icon" href="./assets/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e38c6e" />
    <meta
      name="description"
      content="3D Room Configurator"
    />
    <link rel="apple-touch-icon" href="./assets/open-door-192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Room Configurrator</title>
  </head>

    <div id="root"></div>
